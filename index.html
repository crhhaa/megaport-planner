<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大港開唱 2026 行程規劃</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  :root {
    --bg: #f4f4f8;
    --surface: #ffffff;
    --surface2: #eeeef4;
    --border: #d0d0de;
    --text: #1a1a2e;
    --text2: #666688;
    --accent: #e83c6c;
    --must: #e83c6c;
    --want: #e8862a;
    --tab-active: #e83c6c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    font-size: 15px;
  }
  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; flex-direction: column; }

  /* ─── Header ─── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .back-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .back-btn:hover { border-color: var(--accent); }

  /* ─── Home page ─── */
  .home-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    gap: 24px;
  }
  .home-logo {
    font-size: 48px;
    text-align: center;
    line-height: 1.2;
  }
  .home-title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    color: var(--accent);
  }
  .home-subtitle {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
  }
  .name-section {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .name-section label { font-size: 14px; color: var(--text2); }
  .name-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 16px;
    width: 100%;
    outline: none;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .name-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .name-chip:hover { border-color: var(--accent); color: var(--text); }
  .participants-info {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
  }
  .participants-info strong { color: var(--text); }
  .btn {
    display: block;
    width: 100%;
    max-width: 360px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-align: center;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn:hover { opacity: 0.88; }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 57px; z-index: 90;
  }
  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn.active {
    color: var(--tab-active);
    border-bottom-color: var(--tab-active);
  }

  /* ─── Select page — stage list ─── */
  .select-content { flex: 1; overflow-y: auto; }
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .stage-section { }
  .stage-section-hdr {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    font-size: 12px; font-weight: 700; color: #fff;
    border-bottom: 1px solid rgba(0,0,0,0.2);
  }
  .stage-item {
    display: flex; align-items: center;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .stage-item.sel-must { background: rgba(232,60,108,0.1); }
  .stage-item.sel-want { background: rgba(232,134,42,0.08); }
  .item-time { font-size: 11px; color: var(--text2); white-space: nowrap; min-width: 84px; }
  .item-name { flex: 1; font-size: 13px; font-weight: 600; line-height: 1.3; }
  .item-actions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .spotify-btn {
    display: flex; align-items: center; justify-content: center;
    width: 26px; height: 26px;
    background: #1DB954; border-radius: 50%;
    color: #fff; text-decoration: none; font-size: 13px; flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .spotify-btn:hover { opacity: 0.8; }
  .pref-btn {
    padding: 4px 8px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .pref-btn.must-active { background: var(--must); border-color: var(--must); color: #fff; }
  .pref-btn.want-active { background: var(--want); border-color: var(--want); color: #fff; }

  /* ─── Schedule + Select shared: timeline scroll area ─── */
  .tl-scroll { overflow: auto; flex: 1; }
  .tl-wrap { display: inline-block; min-width: 100%; }

  /* Stage header row */
  .tl-header-row {
    display: flex;
    position: sticky; top: 0; z-index: 20;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
  }
  .tl-time-th {
    flex-shrink: 0;
    width: 42px;
    background: var(--bg);
  }
  .tl-col-header {
    flex-shrink: 0;
    width: 68px;
    padding: 5px 2px;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    line-height: 1.3;
    border-left: 1px solid rgba(0,0,0,0.2);
  }

  /* Timeline body */
  .tl-body { position: relative; }
  .tl-gridline {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(0,0,0,0.06);
    pointer-events: none;
  }
  .tl-gridline.hour { background: rgba(0,0,0,0.12); }
  .tl-time-label {
    position: absolute;
    left: 0;
    width: 40px;
    font-size: 9px;
    color: var(--text2);
    text-align: right;
    padding-right: 4px;
    transform: translateY(-50%);
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }

  /* Artist block */
  .tl-block {
    position: absolute;
    cursor: pointer;
    border-radius: 3px;
    overflow: hidden;
/* 將原本的 border: 1px solid rgba(0,0,0,0.25); 改成下面這樣： */
    border: none;
    transition: filter 0.1s, outline 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }
  .tl-block:active { filter: brightness(1.3); }
  .tl-block.tl-must {
      /* 把 outline 拿掉，這裡我幫你保留了原本的 box-shadow 讓它還有一點淡淡的光暈，若不喜歡也可以一併刪除 */
      box-shadow: 0 0 7px rgba(232,60,108,0.45);
      z-index: 5;
    }
    /* 想聽: same stage color but darkened overlay so it recedes visually */
    .tl-block.tl-want {
      /* 同樣把 outline 拿掉 */
      z-index: 4;
    }
  .tl-block.tl-want::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(244,244,248,0.65);
    pointer-events: none; z-index: 6;
  }
  /* text/badges sit above the overlay */
  .tl-block.tl-want .tl-block-inner { position: relative; z-index: 7; }
  /* conflict/earlyleave blocks: overlay kept so want blocks remain semi-transparent */
  /* Muted travel indicator for non must→must transitions */
  .ptl-travel.ptl-muted { opacity: 0.4; }
  .tl-block-inner {
    width: 100%; height: 100%;
    padding: 2px 3px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow: hidden;
  }
  .tl-block-name {
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,255,255,0.95);
    line-height: 1.25;
    word-break: break-all;
  }
  .tl-badge {
    display: inline-block;
    font-size: 8px;
    font-weight: 800;
    color: #fff;
    border-radius: 2px;
    padding: 1px 3px;
    margin-top: 2px;
    align-self: flex-start;
  }
  .tl-badge.must { background: var(--must); }
  .tl-badge.want { background: var(--want); }

  /* Legend hint */
  .tl-legend {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text2);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tl-legend span { display: flex; align-items: center; gap: 4px; }

  .stage-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    margin-right: 4px;
  }

  /* ─── Schedule page — two-level tab structure ─── */
  .schedule-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .schedule-day-panel { display: none; }
  .schedule-day-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .schedule-empty {
    text-align: center; color: var(--text2); padding: 60px 20px; font-size: 14px;
  }
  .sched-outer { display: inline-block; min-width: 100%; vertical-align: top; }

  /* Sub-tabs (整合時間表 / 個人流程) */
  .sub-tabs {
    display: flex; flex-shrink: 0;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 0 12px; gap: 2px;
  }
  .sub-tab-btn {
    padding: 8px 16px; border: none; background: transparent;
    color: var(--text2); font-size: 13px; font-weight: 600;
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .sub-tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

  /* Sub-panels */
  .sub-panel { display: none; flex: 1; overflow: auto; }
  .sub-panel.active { display: block; }

  /* Person sub-tabs (inside 個人流程) */
  .person-tabs {
    position: sticky; top: 0; z-index: 15;
    display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 6px;
    padding: 8px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .person-tabs::-webkit-scrollbar { display: none; }
  .person-tab-btn {
    padding: 4px 14px; border: 1px solid var(--border); background: transparent;
    color: var(--text2); font-size: 12px; font-weight: 600;
    cursor: pointer; border-radius: 20px; white-space: nowrap; transition: all 0.15s;
    flex-shrink: 0;
  }
  .person-tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .person-flow-panel { display: none; }
  .person-flow-panel.active { display: block; }

  /* Person tags inside integrated timeline blocks */
  .tl-block-persons { display: flex; flex-wrap: wrap; gap: 1px; margin-top: 2px; }
  .tl-person-dot {
    font-size: 7px; font-weight: 700; color: #fff;
    background: rgba(0,0,0,0.45); border-radius: 2px; padding: 1px 2px; line-height: 1.3;
  }
  .tl-person-dot.must { background: var(--must); }
  .tl-person-dot.want { background: rgba(232,134,42,0.9); }

  /* ── 個人流程 — personal timeline (grid) ── */
  /* 時間衝突 (overlap): red glow */
  .ptl-conflict-block {
    z-index: 8 !important;
  }
  .ptl-conflict-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 6px; z-index: 9;
    background: repeating-linear-gradient(90deg,
      #ff2200 0,#ff2200 7px, #ffcc00 7px, #ffcc00 14px);
  }
  /* 要早走 (gap < travel): amber glow */
  .ptl-earlyleave-block {
    z-index: 7 !important;
  }
  .ptl-earlyleave-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 6px; z-index: 9;
    background: repeating-linear-gradient(90deg,
      #ff8800 0,#ff8800 7px, #ffe066 7px, #ffe066 14px);
  }
  /* Travel indicator bar — shown below each show in its column */
  .ptl-travel {
    position: absolute; z-index: 4;
    border-radius: 0 0 4px 4px;
    padding: 3px 5px;
    display: flex; flex-direction: column; justify-content: flex-start; gap: 1px;
    pointer-events: none; overflow: hidden;
  }
  .ptl-travel-l1 {
    font-size: 10px; font-weight: 800;
    color: #1a1a2e; line-height: 1.2;
    word-break: break-word;
  }
  .ptl-travel-l2 {
    font-size: 9px; font-weight: 600;
    color: rgba(26,26,46,0.75); line-height: 1.2;
    word-break: break-word;
  }
  /* Legend bar (shared between integrated + personal) */
  .ptl-legend {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px 14px;
    padding: 7px 12px;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text2); flex-shrink: 0;
  }
  .ptl-legend-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  .ptl-legend-swatch {
    display: inline-block; width: 11px; height: 11px;
    border-radius: 2px; flex-shrink: 0;
  }
  .ptl-legend-swatch.must { background: #7B3FA0; } /* example stage color, full brightness */
  .ptl-legend-swatch.want { background: rgba(123,63,160,0.25); border: 1px solid rgba(123,63,160,0.4); } /* same, dimmed */
  .ptl-legend-swatch.dim  { background: rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.12); }
  .ptl-legend-bar {
    display: inline-block; width: 20px; height: 11px;
    border-radius: 2px; border-left: 3px solid; flex-shrink: 0;
  }
  .ptl-legend-bar.conflict   { background: rgba(255,34,0,0.15);   border-left-color: #ff2200; }
  .ptl-legend-bar.earlyleave { background: rgba(255,136,0,0.15);  border-left-color: #ff8800; }
  .ptl-legend-bar.zero       { background: rgba(255,136,0,0.2);   border-left-color: #ff8800; }
  .ptl-legend-bar.tight      { background: rgba(200,160,0,0.2);   border-left-color: #c09000; }
  .ptl-legend-bar.ok         { background: rgba(40,160,80,0.18);  border-left-color: #28a050; }
  .ptl-legend-divider { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }

  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #44dd88;
    animation: blink 1.5s infinite;
    margin-right: 4px;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .schedule-header-info {
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .persons-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-left: 8px;
  }
  .person-pill {
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  /* ─── Firebase config notice ─── */
  .config-notice {
    background: rgba(232,60,108,0.12);
    border: 1px solid rgba(232,60,108,0.4);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #b01050;
    max-width: 360px;
    width: 100%;
  }
  .config-notice code {
    background: rgba(0,0,0,0.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
  }

  /* ─── Toast ─── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── Responsive ─── */
  @media (min-width: 600px) {
    .schedule-day-panel { max-width: 1200px; margin: 0 auto; }
    .home-content { max-width: 480px; margin: 0 auto; }
  }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

<!-- ══════════════════════════════════════
     PAGE 1: HOME
══════════════════════════════════════ -->
<div id="page-home" class="page active">
  <div class="header">
    <div>
      <div class="header h1" style="font-size:18px;font-weight:700;color:#e83c6c;">大港開唱 2026</div>
      <div class="header-sub" style="text-align: center;">行程規劃系統</div>
    </div>
  </div>
  <div class="home-content">
    <div class="home-logo">🎸</div>
    <div class="home-title">大港開唱 2026<br>行程規劃</div>
    <div class="home-subtitle">多人即時協作 · 合併行程 · 衝突提示</div>

    <div id="firebase-notice" class="config-notice" style="display:none;">
      ⚠️ 請先設定 Firebase：找到 <code>FIREBASE_CONFIG</code> 並填入你的專案設定。
    </div>

    <div class="name-section">
      <label>你的名字</label>
      <input id="name-input" class="name-input" type="text" placeholder="輸入名字..." maxlength="20" autocomplete="off">
      <div id="name-chips" class="name-chips"></div>
      <div id="participants-info" class="participants-info">載入中...</div>
    </div>

    <button class="btn btn-primary" onclick="goToSelect()">填寫我的喜好</button>
    <button class="btn btn-secondary" onclick="goToSchedule()">查看合併行程表</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     PAGE 2: SELECT
══════════════════════════════════════ -->
<div id="page-select" class="page">
  <div class="header">
    <div>
      <div style="font-size:18px;font-weight:700;color:#e83c6c;">選擇喜好</div>
      <div class="header-sub" id="select-subtitle">選擇你想聽的樂團</div>
    </div>
    <button class="back-btn" onclick="goHome()">← 返回</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchSelectDay(1, this)">Day 1 (3/21)</button>
    <button class="tab-btn" onclick="switchSelectDay(2, this)">Day 2 (3/22)</button>
  </div>
  <div class="select-content">
    <div id="select-day1" class="day-panel active"></div>
    <div id="select-day2" class="day-panel"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     PAGE 3: SCHEDULE
══════════════════════════════════════ -->
<div id="page-schedule" class="page">
  <div class="header">
    <div>
      <div style="font-size:18px;font-weight:700;color:#e83c6c;">合併行程表</div>
      <div class="header-sub">
        <span class="live-dot"></span>即時同步
      </div>
    </div>
    <button class="back-btn" onclick="goHome()">← 返回</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchSchedDay(1, this)">Day 1 (3/21)</button>
    <button class="tab-btn" onclick="switchSchedDay(2, this)">Day 2 (3/22)</button>
  </div>
  <div class="schedule-header-info">
    <span class="live-dot"></span>
    <span>已填寫：</span>
    <div id="schedule-persons" class="persons-list"></div>
  </div>
  <div class="schedule-content">
    <div id="schedule-day1" class="schedule-day-panel active"></div>
    <div id="schedule-day2" class="schedule-day-panel"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
// ══════════════════════════════════════
// FIREBASE CONFIG — 請填入你的 Firebase 設定
// ══════════════════════════════════════
// const FIREBASE_CONFIG = {
//   apiKey: "YOUR_API_KEY",
//   authDomain: "YOUR_PROJECT.firebaseapp.com",
//   databaseURL: "https://YOUR_PROJECT-default-rtdb.asia-southeast1.firebasedatabase.app",
//   projectId: "YOUR_PROJECT",
//   storageBucket: "YOUR_PROJECT.appspot.com",
//   messagingSenderId: "YOUR_SENDER_ID",
//   appId: "YOUR_APP_ID"

  const [h, m] = t.split(":").map(Number);

}

  const el = document.getElementById("toast");

}

function subscribePrefs(callback) {
  if (!db) {
    callback({});
    return;
  }
  const r = ref(db, "preferences");
  return onValue(r, snap => {
    callback(snap.val() ?? {});
  });
}

async function writePref(name, id, value) {
  if (!db) { showToast("⚠️ 尚未設定 Firebase"); return; }
  const r = ref(db, `preferences/${name}/${id}`);
  if (value === null) {
    await remove(r);
  } else {
    await set(r, value);
  }
}

// Page navigation

function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

window.goHome = () => showPage("page-home");

window.goToSelect = () => {
  const name = document.getElementById("name-input").value.trim();
  if (!name) { showToast("請先輸入你的名字"); return; }
  currentName = name;
  localStorage.setItem("megaport_name", name);
  document.getElementById("select-subtitle").textContent = `${name} 的喜好`;
  renderSelectPage();
  showPage("page-select");
};

window.goToSchedule = () => {
  showPage("page-schedule");
};

// ══════════════════════════════════════
// SELECT PAGE — stage-grouped list
// ══════════════════════════════════════
function renderSelectPage() {
  for (const day of [1, 2]) {
    const container = document.getElementById(`select-day${day}`);
    const dayItems = SCHEDULE.filter(s => s.day === day);
    let html = '';
    for (const stage of STAGES) {
      const items = dayItems.filter(s => s.stage === stage.id)
        .sort((a, b) => timeToMin(a.start) - timeToMin(b.start));
      if (!items.length) continue;
      html += `<div class="stage-section">`;
      html += `<div class="stage-section-hdr" style="background:${stage.color}">`;
      html += `${esc(stage.name)}</div>`;
      for (const item of items) {
        const pref = allPrefs[currentName]?.[item.id] ?? null;
        const rowCls = pref === 'must' ? 'stage-item sel-must'
                     : pref === 'want' ? 'stage-item sel-want' : 'stage-item';
        const mustCls = pref === 'must' ? 'pref-btn must-active' : 'pref-btn';
        const wantCls = pref === 'want' ? 'pref-btn want-active' : 'pref-btn';
        const spotifyBtn = item.spotifyId
          ? `<a class="spotify-btn" href="https://open.spotify.com/artist/${item.spotifyId}" target="_blank" title="在 Spotify 試聽">♫</a>`
          : `<span style="width:26px;flex-shrink:0"></span>`;
        html += `<div id="srow-${item.id}" class="${rowCls}">
          <div class="item-time">${item.start}–${item.end}</div>
          <div class="item-name">${esc(item.artist)}</div>
          <div class="item-actions">
            ${spotifyBtn}
            <button class="${mustCls}" onclick="togglePref('${item.id}','must')">必聽</button>
            <button class="${wantCls}" onclick="togglePref('${item.id}','want')">想聽</button>
          </div>
        </div>`;
      }
      html += `</div>`; // stage-section
    }
    container.innerHTML = html;
  }
}

window.togglePref = async (id, value) => {
  if (!currentName) { showToast("請先輸入名字"); return; }
  if (!allPrefs[currentName]) allPrefs[currentName] = {};
  const prev = allPrefs[currentName][id];
  const next = prev === value ? null : value;
  if (next === null) delete allPrefs[currentName][id];
  else allPrefs[currentName][id] = next;

  // Update this row in-place
  const row = document.getElementById(`srow-${id}`);
  if (row) {
    row.className = next === 'must' ? 'stage-item sel-must'
                  : next === 'want' ? 'stage-item sel-want' : 'stage-item';
    const [mustBtn, wantBtn] = row.querySelectorAll('.pref-btn');
    mustBtn.className = next === 'must' ? 'pref-btn must-active' : 'pref-btn';
    wantBtn.className = next === 'want' ? 'pref-btn want-active' : 'pref-btn';
  }
  const label = next === 'must' ? '❤️ 必聽' : next === 'want' ? '⭐ 想聽' : '取消';
  showToast(`${label}  ${scheduleMap[id].artist}`);
  await writePref(currentName, id, next);
};

// ══════════════════════════════════════
// TIMELINE helpers (shared by schedule)
// ══════════════════════════════════════
const TL_SLOT   = 2;   // px per minute
const TL_COL_W  = 68;  // px per stage column
const TL_TIME_W = 42;  // px for time label column
const TL_BASE   = 12 * 60 + 30; // 12:30

// ══════════════════════════════════════
// SCHEDULE PAGE rendering
// ══════════════════════════════════════
function renderSchedulePage(prefs) {
  allPrefs = prefs;
  const names = Object.keys(prefs);
  const personsEl = document.getElementById("schedule-persons");
  personsEl.innerHTML = names.length
    ? names.map(n => `<span class="person-pill">${esc(n)}</span>`).join("")
    : "<span style='color:#666'>尚無人填寫</span>";
  for (const day of [1, 2]) renderScheduleDay(day, prefs);
}

function renderScheduleDay(day, prefs) {
  const container = document.getElementById(`schedule-day${day}`);
  const names = Object.keys(prefs).filter(name =>
    SCHEDULE.some(item => item.day === day && prefs[name][item.id])
  );

  // Sub-tab structure
  let html = `<div class="sub-tabs">
    <button class="sub-tab-btn active" onclick="switchSubTab(${day},'integrated',this)">整合時間表</button>
    <button class="sub-tab-btn" onclick="switchSubTab(${day},'personal',this)">個人流程</button>
  </div>`;

  html += `<div id="sub-integrated-${day}" class="sub-panel active">${buildIntegratedTimelineHTML(day, prefs)}</div>`;
  html += `<div id="sub-personal-${day}" class="sub-panel">${buildPersonFlowHTML(day, prefs, names)}</div>`;
  container.innerHTML = html;
}

window.switchSubTab = (day, tab, btn) => {
  const panel = document.getElementById(`schedule-day${day}`);
  panel.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`sub-${tab}-${day}`).classList.add('active');
};

window.switchPersonTab = (day, idx, btn) => {
  const panel = document.getElementById(`sub-personal-${day}`);
  panel.querySelectorAll('.person-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelectorAll('.person-flow-panel').forEach(p => p.classList.remove('active'));
  panel.querySelectorAll('.person-flow-panel')[idx].classList.add('active');
};


// ── 整合時間表: ALL blocks shown, unselected = dimmed ──
function buildIntegratedTimelineHTML(day, prefs) {
  const dayItems = SCHEDULE.filter(s => s.day === day);
  const allMins  = dayItems.flatMap(s => [timeToMin(s.start), timeToMin(s.end)]);
  const topMin   = Math.max(...allMins);
  const totalH   = (topMin - TL_BASE) * TL_SLOT;
  const totalW   = TL_TIME_W + TL_COL_W * STAGES.length;

  let html = `<div class="ptl-legend">
    <span class="ptl-legend-item"><span class="ptl-legend-swatch must"></span>必聽</span>
    <span class="ptl-legend-item"><span class="ptl-legend-swatch want"></span>想聽</span>
    <span class="ptl-legend-item"><span class="ptl-legend-swatch dim"></span>無人選擇</span>
  </div>`;
  html += `<div class="sched-outer" style="min-width:${totalW}px">`;
  html += `<div class="tl-header-row"><div class="tl-time-th" style="width:${TL_TIME_W}px"></div>`;
  for (const stage of STAGES) {
    html += `<div class="tl-col-header" style="width:${TL_COL_W}px;background:${stage.color}">${esc(stage.name)}</div>`;
  }
  html += `</div><div class="tl-body" style="height:${totalH}px">`;

  for (let m = TL_BASE; m <= topMin; m += 30) {
    const top = (m - TL_BASE) * TL_SLOT, isHour = m % 60 === 0;
    const label = `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    html += `<div class="tl-gridline${isHour?' hour':''}" style="top:${top}px;left:${TL_TIME_W}px"></div>`;
    html += `<div class="tl-time-label" style="top:${top}px">${label}</div>`;
  }

  STAGES.forEach((stage, si) => {
    const left = TL_TIME_W + si * TL_COL_W;
    dayItems.filter(s => s.stage === stage.id).forEach(item => {
      const voters  = Object.entries(prefs).filter(([, p]) => p[item.id]);
      const top     = (timeToMin(item.start) - TL_BASE) * TL_SLOT;
      const height  = (timeToMin(item.end) - timeToMin(item.start)) * TL_SLOT;
      const isLit   = voters.length > 0;
      const bg = isLit ? stage.color : 'rgba(0,0,0,0.06)';
      const border  = isLit ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.12)';
      const personTags = voters.map(([name, p]) => {
        const cls = p[item.id] === 'must' ? 'must' : 'want';
        return `<span class="tl-person-dot ${cls}">${esc(name.slice(0,2))}</span>`;
      }).join('');
      html += `<div class="tl-block"
        style="left:${left+1}px;top:${top+1}px;width:${TL_COL_W-2}px;height:${height-2}px;background:${bg};border-color:${border}"
        title="${esc(item.artist)}\n${item.start}–${item.end}${voters.length?'\n'+voters.map(([n,p])=>n+':'+p[item.id]).join(', '):''}">
        <div class="tl-block-inner">
          <div class="tl-block-name" style="${isLit?'':'color:rgba(26,26,46,0.35)'}">${esc(item.artist)}</div>
          ${isLit ? `<div class="tl-block-persons">${personTags}</div>` : ''}
        </div>
      </div>`;
    });
  });
  html += `</div></div>`;
  return html;
}

// ── 個人流程: person sub-tabs + personal timeline ──
function buildPersonFlowHTML(day, prefs, names) {
  if (!names.length) return `<div class="schedule-empty">尚無人填寫喜好</div>`;

  let html = `<div class="person-tabs">`;
  names.forEach((name, i) => {
    html += `<button class="person-tab-btn${i===0?' active':''}" onclick="switchPersonTab(${day},${i},this)">${esc(name)}</button>`;
  });
  html += `</div>`;

  names.forEach((name, i) => {
    html += `<div class="person-flow-panel${i===0?' active':''}">`;
    html += buildPersonalTimelineHTML(day, name, prefs);
    html += `</div>`;
  });
  return html;
}

function buildPersonalTimelineHTML(day, name, prefs) {
  const p = prefs[name] ?? {};
  const dayItems = SCHEDULE.filter(s => s.day === day);
  const myShows = dayItems.filter(item => p[item.id])
    .sort((a, b) => timeToMin(a.start) - timeToMin(b.start));

  if (!myShows.length) {
    return `<div class="schedule-empty" style="padding:40px">${esc(name)} 尚未勾選任何節目</div>`;
  }

  // Only show columns for stages this person selected — keeps grid compact
  const myStageIds = [...new Set(myShows.map(s => s.stage))];
  const myStages   = STAGES.filter(s => myStageIds.includes(s.id));
  const INTEGRATED_W = TL_TIME_W + TL_COL_W * STAGES.length; // same as integrated view
  const PTL_COL_W  = Math.floor((INTEGRATED_W - TL_TIME_W) / myStages.length);

  const allMins = dayItems.flatMap(s => [timeToMin(s.start), timeToMin(s.end)]);
  const topMin  = Math.max(...allMins);
  const totalH  = (topMin - TL_BASE) * TL_SLOT;
  const totalW  = INTEGRATED_W;

  // Pre-compute transitions
  const trans = myShows.map((item, idx) => {
    if (idx === myShows.length - 1) return null;
    const next         = myShows[idx + 1];
    const gap          = timeToMin(next.start) - timeToMin(item.end);
    const travel       = TRAVEL_TIME(item.stage, next.stage);
    const rest         = gap - travel;
    const isRealConflict = gap < 0;          // shows actually overlap
    const isEarlyLeave   = gap >= 0 && gap < travel; // not enough travel time
    return { gap, travel, rest, next, isRealConflict, isEarlyLeave };
  });

  const LEGEND_PERSONAL = `<div class="ptl-legend">
    <span class="ptl-legend-item"><span class="ptl-legend-swatch must"></span>必聽（深色）</span>
    <span class="ptl-legend-item"><span class="ptl-legend-swatch want"></span>想聽（淡色）</span>
    <span class="ptl-legend-divider"></span>
    <span class="ptl-legend-item"><span class="ptl-legend-bar conflict"></span>時間衝突</span>
    <span class="ptl-legend-item"><span class="ptl-legend-bar earlyleave"></span>要早走</span>
    <span class="ptl-legend-item"><span class="ptl-legend-bar zero"></span>剛好趕到</span>
    <span class="ptl-legend-item"><span class="ptl-legend-bar tight"></span>餘裕緊張</span>
    <span class="ptl-legend-item"><span class="ptl-legend-bar ok"></span>時間充裕</span>
  </div>`;

  let html = LEGEND_PERSONAL;
  html += `<div class="sched-outer" style="min-width:${totalW}px">`;
  html += `<div class="tl-header-row"><div class="tl-time-th" style="width:${TL_TIME_W}px"></div>`;
  for (const stage of myStages) {
    html += `<div class="tl-col-header" style="width:${PTL_COL_W}px;background:${stage.color}">${esc(stage.name)}</div>`;
  }
  html += `</div><div class="tl-body" style="height:${totalH}px">`;

  // Gridlines
  for (let m = TL_BASE; m <= topMin; m += 30) {
    const top = (m - TL_BASE) * TL_SLOT, isHour = m % 60 === 0;
    const label = `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    html += `<div class="tl-gridline${isHour?' hour':''}" style="top:${top}px;left:${TL_TIME_W}px"></div>`;
    html += `<div class="tl-time-label" style="top:${top}px">${label}</div>`;
  }

  myShows.forEach((item, idx) => {
    const si     = myStages.findIndex(s => s.id === item.stage);
    const left   = TL_TIME_W + si * PTL_COL_W;
    const top    = (timeToMin(item.start) - TL_BASE) * TL_SLOT;
    const height = (timeToMin(item.end) - timeToMin(item.start)) * TL_SLOT;
    const pref   = p[item.id];
    const color  = stageColor(item.stage);
    const tOut   = trans[idx];
    const tIn    = idx > 0 ? trans[idx - 1] : null;
    const hasRealConflict = (tIn?.isRealConflict) || (tOut?.isRealConflict);
    const hasEarlyLeave   = !hasRealConflict && ((tIn?.isEarlyLeave) || (tOut?.isEarlyLeave));

    // Companions
    const companions = Object.entries(prefs)
      .filter(([n, op]) => n !== name && op[item.id]);
    const companionDots = companions.map(([cn, op]) => {
      const cls = op[item.id] === 'must' ? 'must' : 'want';
      return `<span class="tl-person-dot ${cls}">${esc(cn.slice(0, 2))}</span>`;
    }).join('');

    const prefCls   = pref === 'must' ? 'tl-must' : 'tl-want';
    const prefLabel = pref === 'must' ? '必聽' : '想聽';
    const conflictCls = hasRealConflict ? 'ptl-conflict-block'
                      : hasEarlyLeave   ? 'ptl-earlyleave-block'
                      : '';
    const hasConflict = hasRealConflict || hasEarlyLeave;

    html += `<div class="tl-block ${prefCls} ${conflictCls}"
      style="left:${left+1}px;top:${top+1}px;width:${PTL_COL_W-2}px;height:${height-2}px;background:${color}">
      <div class="tl-block-inner">
        <div class="tl-block-name">${esc(item.artist)}</div>
        ${companionDots ? `<div class="tl-block-persons" style="margin-top:2px">${companionDots}</div>` : ''}
      </div>
    </div>`;

    // Travel indicator below this show
    if (tOut) {
      const { gap, travel, rest, next, isRealConflict, isEarlyLeave } = tOut;
      let travelTop = (timeToMin(item.end) - TL_BASE) * TL_SLOT;
      let travelH   = Math.max(travel * TL_SLOT, 36);
      const nextSn    = stageName(next.stage);
      const sameStage = item.stage === next.stage;
      let extraStyle  = ""; // 新增一個變數來存放衝突時需要的額外 CSS 屬性

      let bg, borderLeft, l1, l2;
      if (isRealConflict) {// Shows actually overlap in time
        travelTop = (timeToMin(next.start) - TL_BASE) * TL_SLOT;
        travelH = (-gap) * TL_SLOT;
        if (travelH < 36) travelH = 36;
        
        // ✨ 改用「近乎純白/微紅」的實心底色（0.96 不透明度），直接把下方的顏色蓋掉
        bg = 'rgba(255, 248, 248, 0.96)'; 
        borderLeft = '4px solid #ff2200';
        l1 = '⚠ 時間衝突'; l2 = `重疊 ${-gap} 分鐘`;
        
        // ✨ 加上頂部的紅色虛線，營造「從這裡開始被切斷/重疊」的視覺感
        extraStyle = 'z-index: 10; border: 2px dashed #ff2200; border-left: 4px solid #ff2200; align-items: flex-end; justify-content: flex-start; text-align: right; padding-right: 6px; padding-top: 4px; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 0 0 6px #ffffff;';
      } else if (isEarlyLeave) {
        // Gap exists but not enough to travel
        bg = 'rgba(255,136,0,0.15)'; borderLeft = '4px solid #ff8800';
        l1 = '⚠ 要早走'; l2 = `需 ${travel} 分，只有 ${gap} 分`;
        
        // ✨ 加上靠右對齊 (flex-end / flex-start) 與白色的文字光暈 (text-shadow)
        extraStyle = 'align-items: flex-end; justify-content: flex-start; text-align: right; padding-right: 6px; padding-top: 4px; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 0 0 6px #ffffff;';
      } else if (sameStage) {
        bg = 'rgba(200,200,220,0.85)'; borderLeft = `4px solid ${color}`;
        l1 = '同場地'; l2 = `休息 ${rest} 分`;
      } else if (rest === 0) {
        bg = 'rgba(255,136,0,0.2)'; borderLeft = '4px solid #ff8800';
        l1 = `→ ${nextSn}`; l2 = `換場 ${travel} 分，剛好趕到`;
      } else if (rest < 10) {
        bg = 'rgba(200,160,0,0.2)'; borderLeft = '4px solid #c09000';
        l1 = `→ ${nextSn}`; l2 = `換場 ${travel} 分，剩 ${rest} 分`;
      } else {
        bg = 'rgba(40,160,80,0.18)'; borderLeft = '4px solid #28a050';
        l1 = `→ ${nextSn}`; l2 = `換場 ${travel} 分，休息 ${rest} 分`;
      }

      const isMustMust = pref === 'must' && p[tOut.next.id] === 'must';
      // ✨ 在 style 裡面加上 ${extraStyle}
      html += `<div class="ptl-travel${isMustMust ? '' : ' ptl-muted'}"
        style="left:${left+1}px;top:${travelTop}px;width:${PTL_COL_W-2}px;height:${travelH}px;background:${bg};border-left:${borderLeft};${extraStyle}">
        <div class="ptl-travel-l1">${esc(l1)}</div>
        <div class="ptl-travel-l2">${esc(l2)}</div>
      </div>`;
    }

      
  });

  html += `</div></div>`;
  return html;
}

// ══════════════════════════════════════
// HOME PAGE — participants count & chips
// ══════════════════════════════════════
function updateHomeParticipants(prefs) {
  const names = Object.keys(prefs);
  const info = document.getElementById("participants-info");
  if (!isConfigured) {
    info.textContent = "（Firebase 未設定，離線模式）";
    return;
  }
  info.innerHTML = names.length
    ? `已有 <strong>${names.length}</strong> 人填寫喜好`
    : "還沒有人填寫";

  const chips = document.getElementById("name-chips");
  chips.innerHTML = names.map(n =>
    `<span class="name-chip" onclick="selectName('${esc(n)}')">${esc(n)}</span>`
  ).join("");
}

window.selectName = (name) => {
  document.getElementById("name-input").value = name;
  currentName = name;
  localStorage.setItem("megaport_name", name);
};

// ══════════════════════════════════════
// Init
// ══════════════════════════════════════
function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// Restore name from localStorage
if (currentName) {
  document.getElementById("name-input").value = currentName;
}

// Subscribe to Firebase (all pages share the same live data)
const unsub = subscribePrefs(prefs => {
  allPrefs = prefs;
  updateHomeParticipants(prefs);
  renderSelectPage(); // refresh selection states
  renderSchedulePage(prefs);
});
